<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.2" flood-color="#000000"/>
    </filter>
  </defs>

  <!-- Main Circle Background -->
  <circle cx="60" cy="60" r="58" fill="#f8fafc" filter="url(#shadow)"/>
  
  <!-- Outer Ring -->
  <circle cx="60" cy="60" r="58" fill="none" stroke="url(#brandGradient)" stroke-width="2" opacity="0.15"/>
  
  <!-- Pin Shape - Main Body (Location Pin) -->
  <path d="M 60 25 C 50.06 25 42 33.06 42 43 C 42 57 60 82 60 82 C 60 82 78 57 78 43 C 78 33.06 69.94 25 60 25 Z" fill="url(#brandGradient)"/>
  
  <!-- Pin Inner Circle (Heart/Dot) -->
  <circle cx="60" cy="43" r="8" fill="#ffffff"/>
  
  <!-- Airplane inside the pin -->
  <g transform="translate(60, 38)">
    <!-- Fuselage -->
    <ellipse cx="0" cy="0" rx="4" ry="7" fill="url(#brandGradient)"/>
    <!-- Wings -->
    <rect x="-9" y="-1.5" width="18" height="3" rx="1.5" fill="url(#brandGradient)"/>
    <!-- Tail Fin -->
    <polygon points="0,-7 -2,-9.5 2,-9.5" fill="url(#brandGradient)"/>
  </g>
  
  <!-- Decorative dots / journey path -->
  <circle cx="55" cy="102" r="1.5" fill="url(#brandGradient)" opacity="0.6"/>
  <circle cx="65" cy="102" r="1.5" fill="url(#brandGradient)" opacity="0.6"/>
  
  <!-- Accent underscore line -->
  <rect x="45" y="88" width="30" height="2" rx="1" fill="url(#brandGradient)" opacity="0.4"/>
</svg>